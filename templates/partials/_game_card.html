<div class="card h-100 shadow-sm">
  <div class="card-body d-flex flex-column">
    <h3 class="h5 card-title mb-1">{{ game.title }}</h3>
    <p class="text-body-secondary small mb-2">Owner: {{ game.owner.username }}</p>
    <p class="small mb-2">{{ game.short_description }}</p>
    <p class="small text-secondary mb-3">Players: {{ game.player_range }}</p>
    {% if game.categories.all %}
      <div class="d-flex flex-wrap gap-1 mb-3">
        {% for category in game.categories.all %}
          <a class="badge text-bg-light border text-decoration-none" href="{% url 'catalog:category-detail' category.pk %}">{{ category.name }}</a>
        {% endfor %}
      </div>
    {% endif %}
    <div class="mt-auto">
      <a href="{% url 'catalog:game-detail' game.pk %}" class="btn btn-sm btn-outline-primary">View details</a>
    </div>
  </div>
</div>
